<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Recepción de Emergencia de Seguros</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1628;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      background: #0a1628;
      overflow: hidden;
    }

    /* ══════════════════════════════════
       PANTALLA DE BIENVENIDA
    ══════════════════════════════════ */
    #welcomeScreen {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: linear-gradient(160deg, #0d1f3c 0%, #0a1628 60%, #051020 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.6s ease;
    }

    #welcomeScreen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .welcome-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(37,211,102,0.5);
      box-shadow: 0 0 30px rgba(37,211,102,0.2);
      margin-bottom: 28px;
    }

    .welcome-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .welcome-title {
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      padding: 0 30px;
    }

    .welcome-subtitle {
      color: #7eb8e8;
      font-size: 12px;
      text-align: center;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    /* Botón principal de inicio */
    #btnStart {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #25d366, #128c3e);
      color: #fff;
      border: none;
      padding: 18px 44px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 6px 32px rgba(37,211,102,0.45);
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #btnStart:active {
      transform: scale(0.96);
      box-shadow: 0 3px 16px rgba(37,211,102,0.3);
    }

    #btnStart::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50px;
      border: 2px solid rgba(37,211,102,0.4);
      animation: pulse-ring 2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 0.8; }
      100% { transform: scale(1.15); opacity: 0;   }
    }

    #btnStart svg {
      width: 26px;
      height: 26px;
      fill: #fff;
    }

    .welcome-note {
      margin-top: 22px;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* Decoración fondo */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,211,102,0.06), transparent 70%);
      pointer-events: none;
    }
    .deco-circle.c1 { width: 320px; height: 320px; top: -80px;  right: -80px; }
    .deco-circle.c2 { width: 260px; height: 260px; bottom: -60px; left: -60px; }

    /* ══════════════════════════════════
       PANTALLA DEL VIDEO
    ══════════════════════════════════ */
    #videoScreen {
      position: absolute;
      inset: 0;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    #videoScreen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Header */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 18px 20px 12px;
      background: linear-gradient(to bottom, rgba(10,22,40,0.95) 70%, transparent);
      text-align: center;
    }

    .header h1 {
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header p {
      color: #7eb8e8;
      font-size: 11px;
      margin-top: 3px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Degradado inferior */
    .overlay-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(to top, rgba(10,22,40,1) 30%, transparent);
      pointer-events: none;
      z-index: 15;
    }

    /* ── Botón WhatsApp ── */
    .btn-whatsapp {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #25d366, #128c3e);
      color: #ffffff;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 30px rgba(37,211,102,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease, transform 0.7s ease;
      white-space: nowrap;
    }

    .btn-whatsapp.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) scale(1);
    }

    .btn-whatsapp:hover  { background: linear-gradient(135deg,#2be872,#15a348); transform: translateX(-50%) scale(1.05); }
    .btn-whatsapp:active { transform: translateX(-50%) scale(0.97); }

    .wsp-icon { width: 28px; height: 28px; flex-shrink: 0; }

    .btn-whatsapp::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50px;
      border: 2px solid rgba(37,211,102,0.55);
      animation: pulse-ring 1.8s ease-out infinite;
      opacity: 0;
    }

    .btn-hint {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.7s ease 0.4s;
      white-space: nowrap;
    }

    .btn-hint.visible { opacity: 1; }

    .footer-logo {
      position: absolute;
      bottom: 10px; right: 14px;
      z-index: 25;
      color: rgba(255,255,255,0.22);
      font-size: 9px;
      text-align: right;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ══ PANTALLA DE BIENVENIDA ══ -->
  <div id="welcomeScreen">
    <div class="deco-circle c1"></div>
    <div class="deco-circle c2"></div>

    <div class="welcome-logo">
      <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310419663032378890/ZuhIXkjLibTszlJX.png" alt="Recepcionista" />
    </div>

    <div class="welcome-title">Recepción de<br>Emergencia de Seguros</div>
    <div class="welcome-subtitle">Hospital Nacional Cayetano Heredia</div>

    <button id="btnStart" onclick="startPresentation()">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Ver presentación
    </button>

    <p class="welcome-note">Toca para iniciar con audio</p>
  </div>

  <!-- ══ PANTALLA DEL VIDEO ══ -->
  <div id="videoScreen">

    <div class="header">
      <h1>Recepción de Emergencia</h1>
      <p>Hospital Nacional Cayetano Heredia</p>
    </div>

    <video
      id="mainVideo"
      playsinline
      preload="auto"
    >
      <source src="https://github.com/Dafon1981/recepcion_presentacion/raw/main/recepcion_v4_final.mp4" type="video/mp4" />
    </video>

    <div class="overlay-bottom"></div>

    <!-- Botón WhatsApp -->
    <a id="btnWsp"
       class="btn-whatsapp"
       href="https://wa.me/51967188120?text=Estoy%20interesado%20en%20informaci%C3%B3n%20de%20recepci%C3%B3n%20de%20emergencia"
       target="_blank"
       rel="noopener noreferrer">
      <svg class="wsp-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffffff" d="M16 3C9.373 3 4 8.373 4 15c0 2.385.668 4.61 1.832 6.5L4 29l7.75-1.812A11.94 11.94 0 0 0 16 28c6.627 0 12-5.373 12-12S22.627 3 16 3zm0 2c5.523 0 10 4.477 10 10S21.523 25 16 25c-1.91 0-3.695-.536-5.215-1.465l-.37-.225-4.598 1.074 1.098-4.48-.238-.385A9.953 9.953 0 0 1 6 15c0-5.523 4.477-10 10-10zm-3.207 5.793c-.195 0-.512.073-.781.366-.27.293-1.024 1-1.024 2.44 0 1.44 1.047 2.83 1.193 3.025.146.196 2.05 3.13 4.977 4.266 2.465.973 2.928.78 3.457.73.53-.05 1.707-.696 1.95-1.367.243-.672.243-1.246.17-1.367-.073-.122-.269-.195-.562-.342-.293-.146-1.733-.855-2.002-.952-.268-.098-.463-.147-.658.147-.195.293-.757.952-.928 1.148-.17.195-.341.22-.634.073-.293-.147-1.236-.456-2.354-1.453-.87-.777-1.457-1.736-1.628-2.03-.17-.292-.018-.45.128-.596.13-.13.293-.342.44-.513.146-.17.195-.293.293-.488.097-.195.048-.366-.025-.513-.073-.146-.646-1.6-.9-2.19-.232-.55-.477-.487-.658-.487z"/>
      </svg>
      Contacto
    </a>

    <div class="btn-hint" id="btnHint">Escríbenos por WhatsApp</div>

    <div class="footer-logo">Hospital Nacional<br>Cayetano Heredia</div>

  </div>
</div>

<script>
  const video       = document.getElementById('mainVideo');
  const welcome     = document.getElementById('welcomeScreen');
  const videoScreen = document.getElementById('videoScreen');
  const btnWsp      = document.getElementById('btnWsp');
  const btnHint     = document.getElementById('btnHint');
  let   btnShown    = false;

  function startPresentation() {
    // 1. Mostrar pantalla de video
    videoScreen.classList.add('visible');

    // 2. Reproducir con audio (el usuario ya interactuó → permitido)
    video.muted = false;
    video.play().catch(() => {
      // Fallback: si falla, intentar con muted
      video.muted = true;
      video.play();
    });

    // 3. Ocultar pantalla de bienvenida con fade
    welcome.classList.add('fade-out');
    setTimeout(() => welcome.style.display = 'none', 650);
  }

  // Mostrar botón WhatsApp en el segundo 10
  video.addEventListener('timeupdate', () => {
    if (!btnShown && video.currentTime >= 10) {
      btnShown = true;
      btnWsp.classList.add('visible');
      btnHint.classList.add('visible');
    }
  });
</script>

</body>
</html>
